    <meta name="description" content="Piaoztsdy Blog">
    <meta name="keywords" content="Piaoztsdy, Blog">
    <meta name="google-site-verification" content="Rpw65P5fpqSSCB8bb7AiHvm17HXkoNf39U95vebJCIM" />
    <!-- logo -->
    <link rel="icon" href="img/logo.png" type="image/png">
</head>

<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">Piaoztsdy Blog</a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <!-- <li><a href="contact.html">Contact</a></li> -->
                </ul>
            </nav>
        </div>
    </header>
    <section class="banner" id="banner">
        <div class="container">
            <h1>Welcome to Piaoztsdy Blog</h1>
            <p>Read the latest articles</p>
        </div>
    </section>
    <section class="content">
        <div class="container">
            <div class="post">
                <!-- <img src="posts/img/post1.jpg" alt="Post 1"> -->
                <div class="post-preview">
                    <h2><a href="posts/post1.html" class="post-preview">个人博客创建完成！</a></h2>
                    <p>这是Piaoztsdy的个人博客！</p>
                    <a href="posts/post1.html" class="btn">Read More</a>
                    <div style="margin-top: 10px;"></div>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <div class="container">
            <div class="back-to-top">
            <a href="#banner" class="back">Back to Top</a>
            </div>
            <div class="footer-content">
            <p>&copy; Piaoztsdy 2025</p>
            <p>You visited: <span id="counter">-1</span></p>
            </div>
        </div>
        <script>
        // 获取计数器元素
        let counterElement = document.getElementById("counter");

        // 获取或初始化计数器值
        let counterValue = localStorage.getItem("counter") || 0;

        // 将计数器值显示在页面上
        counterElement.innerText = counterValue;

        // 增加计数器值
        counterValue++;

        // 将新的计数器值保存到localStorage
        localStorage.setItem("counter", counterValue);
        </script>
    </footer>
</body>
